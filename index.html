<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Full Image Page</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #8F8F8F;
      }

      .image-frame {
        display: flex;
        justify-content: center;
      }

      .image-frame img {
        max-width: 100%;
        height: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="image-frame">
      <img src="images/mail_0630.png" alt="Full screen image" />
    </div>
  </body>
</html>
